services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dokploy-sample-app:local
    container_name: dokploy-sample-app
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
